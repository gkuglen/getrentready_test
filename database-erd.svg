<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .table-box { fill: #f8f9fa; stroke: #6c757d; stroke-width: 2; }
      .table-title { fill: #495057; font-family: Arial, sans-serif; font-weight: bold; font-size: 14px; }
      .field-text { fill: #212529; font-family: Arial, sans-serif; font-size: 12px; }
      .pk-field { fill: #007bff; font-weight: bold; }
      .fk-field { fill: #28a745; }
      .relationship-line { stroke: #6c757d; stroke-width: 2; fill: none; }
      .one-to-many { stroke: #dc3545; stroke-width: 3; }
    </style>
  </defs>

  <!-- Core Tables -->
  <!-- Users Table -->
  <rect x="50" y="50" width="200" height="240" class="table-box"/>
  <text x="150" y="70" text-anchor="middle" class="table-title">users</text>
  <text x="60" y="90" class="field-text pk-field">userId (PK)</text>
  <text x="60" y="105" class="field-text fk-field">propertyId (FK)</text>
  <text x="60" y="120" class="field-text">firstName</text>
  <text x="60" y="135" class="field-text">lastName</text>
  <text x="60" y="150" class="field-text">userType</text>
  <text x="60" y="165" class="field-text fk-field">realEstateRoleId (FK)</text>
  <text x="60" y="180" class="field-text">email</text>
  <text x="60" y="195" class="field-text">mobile</text>
  <text x="60" y="210" class="field-text">hasCookieId</text>
  <text x="60" y="225" class="field-text">isActive</text>
  <text x="60" y="240" class="field-text fk-field">contactPrefId (FK)</text>
  <text x="60" y="255" class="field-text">createdAt</text>

  <!-- Properties Table -->
  <rect x="350" y="50" width="200" height="280" class="table-box"/>
  <text x="450" y="70" text-anchor="middle" class="table-title">properties</text>
  <text x="360" y="90" class="field-text pk-field">propertyId (PK)</text>
  <text x="360" y="105" class="field-text fk-field">userId (FK)</text>
  <text x="360" y="120" class="field-text">address</text>
  <text x="360" y="135" class="field-text">streetAddr</text>
  <text x="360" y="150" class="field-text">city</text>
  <text x="360" y="165" class="field-text">state</text>
  <text x="360" y="180" class="field-text">zip</text>
  <text x="360" y="195" class="field-text">sqft</text>
  <text x="360" y="210" class="field-text">rent</text>
  <text x="360" y="225" class="field-text">br</text>
  <text x="360" y="240" class="field-text">ba</text>
  <text x="360" y="255" class="field-text">lat</text>
  <text x="360" y="270" class="field-text">long</text>
  <text x="360" y="285" class="field-text">hasImage</text>
  <text x="360" y="300" class="field-text">isUserSubmitted</text>

  <!-- Finance Table -->
  <rect x="650" y="50" width="200" height="320" class="table-box"/>
  <text x="750" y="70" text-anchor="middle" class="table-title">finance</text>
  <text x="660" y="90" class="field-text pk-field">financeId (PK)</text>
  <text x="660" y="105" class="field-text fk-field">userId (FK)</text>
  <text x="660" y="120" class="field-text fk-field">propertyId (FK)</text>
  <text x="660" y="135" class="field-text">rent</text>
  <text x="660" y="150" class="field-text">arvRent</text>
  <text x="660" y="165" class="field-text">propertyValue</text>
  <text x="660" y="180" class="field-text">arvPropertyValue</text>
  <text x="660" y="195" class="field-text">cocReturn</text>
  <text x="660" y="210" class="field-text">cocAmount</text>
  <text x="660" y="225" class="field-text">marketCapRate</text>
  <text x="660" y="240" class="field-text">rentalUpside</text>
  <text x="660" y="255" class="field-text">rentPremium</text>
  <text x="660" y="270" class="field-text">min</text>
  <text x="660" y="285" class="field-text">q1</text>
  <text x="660" y="300" class="field-text">q3</text>
  <text x="660" y="315" class="field-text">max</text>
  <text x="660" y="330" class="field-text">userCocReturn</text>
  <text x="660" y="345" class="field-text">userCapRate</text>

  <!-- Lookup Tables -->
  <!-- Real Estate Roles -->
  <rect x="50" y="350" width="180" height="80" class="table-box"/>
  <text x="140" y="370" text-anchor="middle" class="table-title">real_estate_roles</text>
  <text x="60" y="390" class="field-text pk-field">realEstateRoleId (PK)</text>
  <text x="60" y="405" class="field-text">roleType</text>

  <!-- Property Types -->
  <rect x="280" y="350" width="180" height="100" class="table-box"/>
  <text x="370" y="370" text-anchor="middle" class="table-title">property_type</text>
  <text x="290" y="390" class="field-text pk-field">propertyTypeId (PK)</text>
  <text x="290" y="405" class="field-text">propertyType</text>
  <text x="290" y="420" class="field-text">propertyDescription</text>

  <!-- Contact Preference -->
  <rect x="500" y="350" width="180" height="80" class="table-box"/>
  <text x="590" y="370" text-anchor="middle" class="table-title">contact_preference</text>
  <text x="510" y="390" class="field-text pk-field">id (PK)</text>
  <text x="510" y="405" class="field-text">method</text>

  <!-- Service Type -->
  <rect x="720" y="350" width="180" height="100" class="table-box"/>
  <text x="810" y="370" text-anchor="middle" class="table-title">service_type</text>
  <text x="730" y="390" class="field-text pk-field">serviceId (PK)</text>
  <text x="730" y="405" class="field-text">serviceType</text>
  <text x="730" y="420" class="field-text">label</text>
  <text x="730" y="435" class="field-text">sortOrder</text>

  <!-- Users Info Table -->
  <rect x="950" y="50" width="200" height="220" class="table-box"/>
  <text x="1050" y="70" text-anchor="middle" class="table-title">users_info</text>
  <text x="960" y="90" class="field-text pk-field">userId (PK)</text>
  <text x="960" y="105" class="field-text fk-field">propertyId (FK)</text>
  <text x="960" y="120" class="field-text fk-field">financeId (FK)</text>
  <text x="960" y="135" class="field-text">roleName</text>
  <text x="960" y="150" class="field-text">unitsOwned</text>
  <text x="960" y="165" class="field-text">hasPropmngr</text>
  <text x="960" y="180" class="field-text">isSell</text>
  <text x="960" y="195" class="field-text">isHold</text>
  <text x="960" y="210" class="field-text">isBuy</text>
  <text x="960" y="225" class="field-text">isValueAdd</text>
  <text x="960" y="240" class="field-text">isOpportunistic</text>

  <!-- Lead Management Tables -->
  <!-- Leads -->
  <rect x="50" y="500" width="180" height="120" class="table-box"/>
  <text x="140" y="520" text-anchor="middle" class="table-title">leads</text>
  <text x="60" y="540" class="field-text pk-field">leadId (PK)</text>
  <text x="60" y="555" class="field-text fk-field">userId (FK)</text>
  <text x="60" y="570" class="field-text fk-field">serviceId (FK)</text>
  <text x="60" y="585" class="field-text fk-field">statusId (FK)</text>
  <text x="60" y="600" class="field-text">createdAt</text>

  <!-- Lead Status -->
  <rect x="280" y="500" width="180" height="100" class="table-box"/>
  <text x="370" y="520" text-anchor="middle" class="table-title">lead_status</text>
  <text x="290" y="540" class="field-text pk-field">statusId (PK)</text>
  <text x="290" y="555" class="field-text">statusCode</text>
  <text x="290" y="570" class="field-text">label</text>
  <text x="290" y="585" class="field-text">sortOrder</text>

  <!-- Service Leads -->
  <rect x="500" y="500" width="180" height="140" class="table-box"/>
  <text x="590" y="520" text-anchor="middle" class="table-title">service_leads</text>
  <text x="510" y="540" class="field-text pk-field">leadId (PK)</text>
  <text x="510" y="555" class="field-text fk-field">userId (FK)</text>
  <text x="510" y="570" class="field-text fk-field">propertyId (FK)</text>
  <text x="510" y="585" class="field-text">serviceType</text>
  <text x="510" y="600" class="field-text">preferredContact</text>
  <text x="510" y="615" class="field-text">status</text>
  <text x="510" y="630" class="field-text">createdAt</text>

  <!-- Providers -->
  <rect x="720" y="500" width="180" height="140" class="table-box"/>
  <text x="810" y="520" text-anchor="middle" class="table-title">providers</text>
  <text x="730" y="540" class="field-text pk-field">providerId (PK)</text>
  <text x="730" y="555" class="field-text">busName</text>
  <text x="730" y="570" class="field-text">firstName</text>
  <text x="730" y="585" class="field-text">lastName</text>
  <text x="730" y="600" class="field-text fk-field">serviceId (FK)</text>
  <text x="730" y="615" class="field-text">email</text>
  <text x="730" y="630" class="field-text fk-field">contactPrefId (FK)</text>

  <!-- Analytics Tables -->
  <!-- User Sessions -->
  <rect x="50" y="700" width="200" height="180" class="table-box"/>
  <text x="150" y="720" text-anchor="middle" class="table-title">user_sessions</text>
  <text x="60" y="740" class="field-text pk-field">sessionId (PK)</text>
  <text x="60" y="755" class="field-text fk-field">userId (FK)</text>
  <text x="60" y="770" class="field-text">userCookieId</text>
  <text x="60" y="785" class="field-text">ipAddress</text>
  <text x="60" y="800" class="field-text">userAgent</text>
  <text x="60" y="815" class="field-text">startTime</text>
  <text x="60" y="830" class="field-text">endTime</text>
  <text x="60" y="845" class="field-text">sessionDuration</text>
  <text x="60" y="860" class="field-text">isConverted</text>

  <!-- User Events -->
  <rect x="300" y="700" width="200" height="180" class="table-box"/>
  <text x="400" y="720" text-anchor="middle" class="table-title">user_events</text>
  <text x="310" y="740" class="field-text pk-field">eventId (PK)</text>
  <text x="310" y="755" class="field-text fk-field">sessionId (FK)</text>
  <text x="310" y="770" class="field-text fk-field">userId (FK)</text>
  <text x="310" y="785" class="field-text">userCookieId</text>
  <text x="310" y="800" class="field-text">eventType</text>
  <text x="310" y="815" class="field-text">eventAction</text>
  <text x="310" y="830" class="field-text">eventCategory</text>
  <text x="310" y="845" class="field-text fk-field">propertyId (FK)</text>
  <text x="310" y="860" class="field-text">timestamp</text>

  <!-- Property Analytics -->
  <rect x="550" y="700" width="200" height="180" class="table-box"/>
  <text x="650" y="720" text-anchor="middle" class="table-title">property_analytics</text>
  <text x="560" y="740" class="field-text pk-field">analyticsId (PK)</text>
  <text x="560" y="755" class="field-text fk-field">propertyId (FK)</text>
  <text x="560" y="770" class="field-text fk-field">userId (FK)</text>
  <text x="560" y="785" class="field-text">userCookieId</text>
  <text x="560" y="800" class="field-text">viewType</text>
  <text x="560" y="815" class="field-text">timeSpent</text>
  <text x="560" y="830" class="field-text">tabsViewed</text>
  <text x="560" y="845" class="field-text">interactionsCount</text>
  <text x="560" y="860" class="field-text">reportGenerated</text>

  <!-- Images -->
  <rect x="800" y="700" width="180" height="160" class="table-box"/>
  <text x="890" y="720" text-anchor="middle" class="table-title">images</text>
  <text x="810" y="740" class="field-text fk-field">userId (FK)</text>
  <text x="810" y="755" class="field-text fk-field">propertyId (FK)</text>
  <text x="810" y="770" class="field-text">filename</text>
  <text x="810" y="785" class="field-text">imageId</text>
  <text x="810" y="800" class="field-text">url</text>
  <text x="810" y="815" class="field-text">format</text>
  <text x="810" y="830" class="field-text">width</text>
  <text x="810" y="845" class="field-text">height</text>

  <!-- Business Metrics -->
  <rect x="1020" y="700" width="200" height="180" class="table-box"/>
  <text x="1120" y="720" text-anchor="middle" class="table-title">business_metrics</text>
  <text x="1030" y="740" class="field-text pk-field">metricId (PK)</text>
  <text x="1030" y="755" class="field-text">metricDate</text>
  <text x="1030" y="770" class="field-text">totalUsers</text>
  <text x="1030" y="785" class="field-text">newUsers</text>
  <text x="1030" y="800" class="field-text">totalProperties</text>
  <text x="1030" y="815" class="field-text">totalReports</text>
  <text x="1030" y="830" class="field-text">totalLeads</text>
  <text x="1030" y="845" class="field-text">conversionRate</text>
  <text x="1030" y="860" class="field-text">avgSessionDuration</text>

  <!-- Relationship Lines -->
  <!-- Users to Properties -->
  <line x1="250" y1="150" x2="350" y2="150" class="relationship-line one-to-many"/>
  
  <!-- Properties to Finance -->
  <line x1="550" y1="180" x2="650" y2="180" class="relationship-line one-to-many"/>
  
  <!-- Users to Finance -->
  <line x1="250" y1="120" x2="300" y2="120" class="relationship-line"/>
  <line x1="300" y1="120" x2="300" y2="20" class="relationship-line"/>
  <line x1="300" y1="20" x2="680" y2="20" class="relationship-line"/>
  <line x1="680" y1="20" x2="680" y2="50" class="relationship-line"/>
  
  <!-- Users to Real Estate Roles -->
  <line x1="140" y1="290" x2="140" y2="350" class="relationship-line"/>
  
  <!-- Users to Contact Preference -->
  <line x1="250" y1="240" x2="500" y2="390" class="relationship-line"/>
  
  <!-- Properties to Users Info -->
  <line x1="550" y1="120" x2="950" y2="120" class="relationship-line"/>
  
  <!-- Finance to Users Info -->
  <line x1="850" y1="180" x2="950" y2="180" class="relationship-line"/>
  
  <!-- Users to Leads -->
  <line x1="150" y1="290" x2="150" y2="500" class="relationship-line one-to-many"/>
  
  <!-- Service Type to Leads -->
  <line x1="720" y1="400" x2="200" y2="400" class="relationship-line"/>
  <line x1="200" y1="400" x2="200" y2="570" class="relationship-line"/>
  <line x1="200" y1="570" x2="230" y2="570" class="relationship-line"/>
  
  <!-- Lead Status to Leads -->
  <line x1="280" y1="550" x2="230" y2="550" class="relationship-line"/>
  
  <!-- Users to Service Leads -->
  <line x1="250" y1="200" x2="500" y2="555" class="relationship-line one-to-many"/>
  
  <!-- Properties to Service Leads -->
  <line x1="450" y1="330" x2="450" y2="470" class="relationship-line"/>
  <line x1="450" y1="470" x2="590" y2="470" class="relationship-line"/>
  <line x1="590" y1="470" x2="590" y2="500" class="relationship-line"/>
  
  <!-- Service Type to Providers -->
  <line x1="810" y1="450" x2="810" y2="500" class="relationship-line one-to-many"/>
  
  <!-- Users to User Sessions -->
  <line x1="150" y1="290" x2="150" y2="700" class="relationship-line one-to-many"/>
  
  <!-- User Sessions to User Events -->
  <line x1="250" y1="790" x2="300" y2="790" class="relationship-line one-to-many"/>
  
  <!-- Properties to User Events -->
  <line x1="450" y1="330" x2="450" y2="680" class="relationship-line"/>
  <line x1="450" y1="680" x2="400" y2="680" class="relationship-line"/>
  <line x1="400" y1="680" x2="400" y2="700" class="relationship-line"/>
  
  <!-- Properties to Property Analytics -->
  <line x1="550" y1="200" x2="600" y2="200" class="relationship-line"/>
  <line x1="600" y1="200" x2="600" y2="700" class="relationship-line one-to-many"/>
  
  <!-- Properties to Images -->
  <line x1="550" y1="250" x2="800" y2="750" class="relationship-line one-to-many"/>

  <!-- Legend -->
  <rect x="1050" y="350" width="200" height="120" class="table-box"/>
  <text x="1150" y="370" text-anchor="middle" class="table-title">Legend</text>
  <text x="1060" y="390" class="field-text pk-field">Primary Key (PK)</text>
  <text x="1060" y="405" class="field-text fk-field">Foreign Key (FK)</text>
  <text x="1060" y="420" class="field-text">Regular Field</text>
  <line x1="1060" y1="440" x2="1100" y2="440" class="relationship-line"/>
  <text x="1110" y="445" class="field-text">One-to-One</text>
  <line x1="1060" y1="455" x2="1100" y2="455" class="one-to-many"/>
  <text x="1110" y="460" class="field-text">One-to-Many</text>
</svg>